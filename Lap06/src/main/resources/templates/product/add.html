<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Product</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="container mt-4">

    <h2>Add Product</h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control"
                th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" th:field="*{price}" class="form-control"
                th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label>Image</label>
            <input type="file" name="imageFile" id="imageInput" class="form-control" accept="image/*">
            <div class="mt-2 text-center" style="max-width: 200px;">
                <img id="imagePreview" src="#" style="display: none; max-width: 100%; height: auto;"
                    class="img-thumbnail" />
            </div>
        </div>

        <div class="mb-3">
            <label>Category</label>

            <select th:field="*{category.id}" class="form-control">

                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">
                </option>

            </select>

        </div>

        <button class="btn btn-success">Save</button>
        <a href="/products" class="btn btn-secondary">Back</a>

    </form>

    <script>
        document.getElementById('imageInput').addEventListener('change', function (event) {
            const file = event.target.files[0];
            const preview = document.getElementById('imagePreview');

            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        });
    </script>
</body>

</html>
