<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Product List</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="container mt-4">

    <h2 class="mb-4">Product List</h2>

    <a href="/products/add" class="btn btn-primary mb-3">Add Product</a>

    <table class="table table-bordered">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Image</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>

                <td>
                    <img th:src="@{'/images/' + ${p.image}}" width="80">
                </td>

                <td th:text="${p.category != null ? p.category.name : 'No Category'}"></td>

                <td>
                    <a th:href="@{'/products/edit/' + ${p.id}}" class="btn btn-success btn-sm">Edit</a>
                    <a th:href="@{'/products/delete/' + ${p.id}}" class="btn btn-danger btn-sm"
                        onclick="return confirm('Are you sure you want to delete this product?');">Delete</a>
                </td>

            </tr>

        </tbody>
    </table>

</body>

</html>
